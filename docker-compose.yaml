services:
  redis:
    image: redis:alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - backend-network

  postgres:
    image: postgres:alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    restart: "no"
    env_file:
      - .env
    security_opt:
      - no-new-privileges:true
    networks:
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override to ensure correct values regardless of .env content
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=3000
      - RUST_LOG=dnd_back=info,tower_http=info
    ports:
      # Bind to localhost only -- nginx on the host proxies to this port
      - "127.0.0.1:3000:3000"
    security_opt:
      - no-new-privileges:true
    networks:
      - backend-network
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

  # Build-only service: populates the frontend-static volume and exits.
  # The host nginx mounts the underlying volume directory.
  frontend-static:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder-frontend
    restart: "no"
    volumes:
      - frontend-static:/app/crates/frontend/dist

networks:
  # internal: true blocks outbound internet access from containers.
  # Port bindings to the host (backend port 3000) still work normally.
  backend-network:
    internal: true

volumes:
  postgres-data:
  frontend-static:
